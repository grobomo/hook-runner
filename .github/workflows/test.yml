name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run runner tests
        run: bash scripts/test/test-runners.sh

      - name: Run setup wizard tests
        run: bash scripts/test/test-setup-wizard.sh

      - name: Run async tests
        run: bash scripts/test/test-async.sh

      - name: Run module validation tests
        run: bash scripts/test/test-modules.sh

      - name: Run module sync tests
        run: bash scripts/test/test-module-sync.sh
