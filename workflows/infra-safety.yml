name: infra-safety
description: Cloud and infrastructure safety — no ad-hoc commands, required tags, env var checks, config audit
version: 1
steps:
  - id: active
    name: Workflow is active — infrastructure safety modules enforced
    gate:
      require_files: []
    completion:
      require_files: []

modules:
  - aws-tagging-gate
  - crlf-ssh-key-check
  - disk-space-guard
  - env-var-check
  - hook-autocommit
  - no-adhoc-commands
  - no-focus-steal
  - settings-audit-log
  - settings-change-gate
  - settings-hooks-gate
