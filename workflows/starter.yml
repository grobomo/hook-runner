name: starter
description: Safe defaults for any Claude Code user. Blocks common mistakes (force push, destructive git, rm -rf, secret commits) and adds helpful guardrails (commit quality, test reminders). Start here, then enable shtd when you want full development discipline.
version: 2
enabled: true
steps:
  - id: ready
    name: Ready to work
    gate:
      require_files: []
    completion:
      require_files: []

modules:
  # Git safety — prevent irreversible mistakes
  - force-push-gate
  - git-destructive-guard
  - secret-scan-gate
  - commit-quality-gate
  - victory-declaration-gate
  # File safety — prevent accidental deletion
  - archive-not-delete
  # Code quality — catch common issues
  - no-hardcoded-paths
  - test-coverage-check
  - preserve-iterated-content
  # Hook system protection — prevent self-sabotage
  - hook-editing-gate
  - no-hook-bypass
  - no-rules-gate
  - hook-autocommit
  - hook-health-monitor
  - hook-integrity-monitor
  # Account/platform safety — correct identity and environment
  - gh-auto-gate
  - publish-json-guard
  - settings-change-gate
  - settings-hooks-gate
  - messaging-safety-gate
  - no-nested-claude
  - no-focus-steal
  - windowless-spawn-gate
  # Infrastructure — disk, CRLF, SSH
  - disk-space-guard
  - disk-space-detect
  - crlf-ssh-key-check
  - crlf-detector
  # Inter-project coordination
  - inter-project-audit
  - inter-project-priority
  # Session lifecycle — context and continuity
  - auto-continue
  - never-give-up
  - backup-check
  - drift-check
  - hook-self-test
  - load-instructions
  - project-health
  - session-cleanup
  - session-collision-detector
  - terminal-title
  - workflow-summary
  # User prompt monitoring
  - interrupt-detector
  - prompt-logger
