name: shtd
description: Spec-Hook-Test-Driven — all development discipline in one workflow. Enforces spec → branch → test → implement → PR pipeline, code quality, infrastructure safety, messaging guards, session lifecycle, and self-improvement.
version: 2
steps:
  - id: spec
    name: Write spec describing the feature or rule
    gate:
      require_files: []
    completion:
      require_files: ["specs/*/spec.md"]
  - id: tasks
    name: Break spec into tasks with e2e test checkpoints
    gate:
      require_step: spec
    completion:
      require_files: ["specs/*/tasks.md"]
  - id: branch
    name: Create feature branch from main
    gate:
      require_step: tasks
    completion:
      require_files: []
  - id: test
    name: Write test script before implementation
    gate:
      require_step: branch
    completion:
      require_files: []
  - id: implement
    name: Implement the feature
    gate:
      require_step: test
    completion:
      require_files: []
  - id: verify
    name: Run tests and verify all pass
    gate:
      require_step: implement
    completion:
      require_files: []
  - id: pr
    name: Create PR with task ID in title
    gate:
      require_step: verify
    completion:
      require_files: []

modules:
  # Development pipeline (was: shtd)
  - branch-pr-gate
  - commit-msg-check
  - continuous-claude-gate
  - drift-review
  - enforcement-gate
  - hook-editing-gate
  - hook-integrity-monitor
  - workflow-compliance-gate
  - pr-per-task-gate
  - push-unpushed
  - remote-tracking-gate
  - secret-scan-gate
  - spec-gate
  - task-completion-gate
  - test-before-done
  - test-checkpoint-gate
  - why-reminder
  - workflow-gate
  # Code quality (was: code-quality)
  - archive-not-delete
  - claude-p-pattern
  - git-destructive-guard
  - git-rebase-safety
  - no-fragile-heuristics
  - no-hardcoded-paths
  - preserve-iterated-content
  - root-cause-gate
  - no-rules-gate
  - rule-hygiene
  - test-coverage-check
  - update-stale-docs
  # Infrastructure safety (was: infra-safety)
  - aws-tagging-gate
  - crlf-detector
  - crlf-ssh-key-check
  - disk-space-guard
  - disk-space-detect
  - force-push-gate
  - env-var-check
  - session-cleanup
  - hook-autocommit
  - no-adhoc-commands
  - cross-project-todo-gate
  - no-focus-steal
  - settings-audit-log
  - settings-change-gate
  - settings-hooks-gate
  # Messaging safety (was: messaging-safety)
  - messaging-safety-gate
  - share-is-generic
  # Self-improvement (was: self-improvement)
  - instruction-to-hook-gate
  - instruction-detector
  - interrupt-detector
  - troubleshoot-detector
  - no-passive-rules
  - prompt-logger
  # Self-reflection (LLM-powered introspection + gamified scoring)
  - self-reflection
  - reflection-gate
  - reflection-score
  - reflection-score-inject
  - session-brain-analysis
  # Session lifecycle (was: session-management)
  - auto-continue
  - backup-check
  - chat-export
  - config-sync
  - load-instructions
  - load-lessons
  - log-gotchas
  - mark-turn-complete
  - never-give-up
  - project-health
  - session-collision-detector
  - terminal-title
  - workflow-summary
