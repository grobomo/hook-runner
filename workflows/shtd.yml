  - claude-p-pattern
  - git-destructive-guard
  - git-rebase-safety
  - no-fragile-heuristics
  - no-hardcoded-paths
  - preserve-iterated-content
  - root-cause-gate
  - no-rules-gate
  - rule-hygiene
  - test-coverage-check
  - empty-output-detector
