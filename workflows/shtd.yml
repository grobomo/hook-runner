name: shtd
description: Spec-Hook-Test-Driven — all development discipline in one workflow. Enforces spec → branch → test → implement → PR pipeline, code quality, infrastructure safety, messaging guards, session lifecycle, and self-improvement.
version: 3
enabled: true
extends: starter
steps:
  - id: spec
    name: Write spec describing the feature or rule
    gate:
      require_files: []
    completion:
      require_files: ["specs/*/spec.md"]
  - id: tasks
    name: Break spec into tasks with e2e test checkpoints
    gate:
      require_step: spec
    completion:
      require_files: ["specs/*/tasks.md"]
  - id: branch
    name: Create feature branch from main
    gate:
      require_step: tasks
    completion:
      require_files: []
  - id: test
    name: Write test script before implementation
    gate:
      require_step: branch
    completion:
      require_files: []
  - id: implement
    name: Implement the feature
    gate:
      require_step: test
    completion:
      require_files: []
  - id: verify
    name: Run tests and verify all pass
    gate:
      require_step: implement
    completion:
      require_files: []
  - id: pr
    name: Create PR with task ID in title
    gate:
      require_step: verify
    completion:
      require_files: []

modules:
  # === SHTD-EXCLUSIVE: spec-based methodology ===
  - spec-gate
  - spec-before-code-gate
  - enforcement-gate
  # === DEV DISCIPLINE: shared with gsd (tagged: shtd, gsd) ===
  # Development pipeline
  - branch-pr-gate
  - commit-msg-check
  - continuous-claude-gate
  - drift-review
  - hook-editing-gate
  - hook-integrity-monitor
  - workflow-compliance-gate
  - pr-per-task-gate
  - push-unpushed
  - remote-tracking-gate
  - commit-counter-gate
  - commit-quality-gate
  - unresolved-issues-gate
  - victory-declaration-gate
  - deploy-gate
  - deploy-history-reminder
  - secret-scan-gate
  - task-completion-gate
  - test-before-done
  - test-checkpoint-gate
  - gsd-gate
  - e2e-self-report-gate
  - unresolved-issues-check
  - why-reminder
  - workflow-gate
  - blueprint-no-sleep
  - gh-auto-gate
  - no-hook-bypass
  - no-nested-claude
  - publish-json-guard
  # Code quality
