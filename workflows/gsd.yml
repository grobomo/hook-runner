name: gsd
description: GSD-driven development discipline. Enforces .planning/ → ROADMAP.md → phase plan → branch → execute → PR pipeline. Replaces shtd's spec-based flow with GSD's phase-based flow while keeping all safety, quality, and session lifecycle modules.
version: 3
enabled: true
extends: starter
steps:
  - id: plan
    name: Discuss and plan the phase (PLAN.md exists)
    gate:
      require_files: []
    completion:
      require_files: [".planning/ROADMAP.md"]
  - id: branch
    name: Create feature branch for the phase
    gate:
      require_step: plan
    completion:
      require_files: []
  - id: execute
    name: Execute the plan tasks
    gate:
      require_step: branch
    completion:
      require_files: []
  - id: verify
    name: Verify implementation passes tests
    gate:
      require_step: execute
    completion:
      require_files: []
  - id: pr
    name: Create PR for the phase work
    gate:
      require_step: verify
    completion:
      require_files: []

# T796: Only GSD-exclusive modules listed here (62 modules).
# 47 starter modules inherited via extends: starter — not duplicated.
modules:
  # === GSD-EXCLUSIVE: phase-based methodology ===
  - gsd-plan-gate
  - gsd-branch-gate
  - gsd-pr-gate
  # === DEV DISCIPLINE: development pipeline ===
  - branch-pr-gate
  - commit-msg-check
  - commit-counter-gate
  - continuous-claude-gate
  - deploy-gate
  - deploy-history-reminder
  - drift-review
  - e2e-self-report-gate
  - pr-first-gate
  - pr-per-task-gate
  - push-unpushed
  - remote-tracking-gate
  - task-completion-gate
  - test-before-done
  - test-checkpoint-gate
  - unresolved-issues-gate
  - unresolved-issues-check
  - workflow-compliance-gate
  - workflow-gate
  - why-reminder
  # Code quality
  - blueprint-no-sleep
  - claude-p-pattern
  - empty-output-detector
  - git-rebase-safety
  - no-fragile-heuristics
  - result-review-gate
  - root-cause-gate
  - rule-hygiene
  - update-stale-docs
  - worktree-gate
  # Infrastructure safety
  - aws-tagging-gate
  - cross-project-todo-gate
  - cwd-drift-detector
  - env-var-check
  - inter-project-priority-gate
  - no-adhoc-commands
